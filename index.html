<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jeh Porcino | Designer Gráfica & Web Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

<script async src="https://www.googletagmanager.com/gtag/js?id=G-EV46NH27RJ"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<style>
/* ── RESET E ESTILOS GERAIS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-top: 80px; }
img { display: block; max-width: 100%; }
section { padding: 60px 20px; } /* Ajuste Mobile First */
.container { max-width: 1100px; margin: 0 auto; }

/* ── HEADER ── */
header { position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); }
.nav-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 1.15rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
nav ul { display: flex; list-style: none; gap: 15px; } /* Gap reduzido para mobile */
nav a { font-size: 0.8rem; color: #a3a3a3; text-transform: uppercase; text-decoration: none; }
nav a:hover { color: #fff; }

/* ── HOME ── */
.hero { min-height: calc(50vh - 80px); display: flex; justify-content: center; align-items: center; }

/* ── SOBRE ── */
.section-tag { font-size: 0.75rem; color: #a3a3a3; text-transform: uppercase; margin-bottom: 12px; display: block; }
.section-title { font-size: 2rem; margin-bottom: 30px; }
.about-grid { display: grid; grid-template-columns: 1fr; gap: 32px; } /* Mobile First: 1 coluna */
.about-text p { font-size: 1rem; line-height: 1.6; color: #e5e5e5; margin-bottom: 16px; }

/* ── SOLUÇÕES ── */
.solutions-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
.sol-card { background: #0a0a0a; padding: 30px; border-radius: 16px; border: 1px solid #1a1a1a; text-align: center; }

/* ── CARROSSEL ── */
.carousel-container { position: relative; width: 100%; margin: 0 auto; min-height: 250px; overflow: hidden; border-radius: 12px; }
.carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
.slide { min-width: 100%; display: flex; align-items: center; justify-content: center; }
.nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; width: 40px; height: 40px; cursor: pointer; z-index: 10; }
.prev { left: 10px; } .next { right: 10px; }

/* ── CONTATO ── */
.contact-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
input, textarea { width: 100%; padding: 16px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; border-radius: 8px; }
.submit-btn { background: #fff; color: #000; padding: 16px; border: none; width: 100%; border-radius: 8px; font-weight: bold; }

/* ── RESPONSIVIDADE (TABLET/DESKTOP) ── */
@media (min-width: 768px) {
    section { padding: 100px 20px; }
    .about-grid, .contact-grid { grid-template-columns: 1fr 1fr; }
    .solutions-grid { grid-template-columns: repeat(3, 1fr); }
    .carousel-container { aspect-ratio: 2 / 1; min-height: auto; }
}
</style>
</head>
<body>
    </body>
</html>
